name: Generate site assets

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: "5 7 * * *"

concurrency:
  group: generate-site-assets-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Cache Puppeteer browser
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Setup Node
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Log cache status
        run: |
          echo "Puppeteer cache hit: ${{ steps.cache-puppeteer.outputs.cache-hit }}"
          echo "npm cache enabled through actions/setup-node"

      - name: Install dependencies
        run: |
          start_ts=$(date +%s)
          npm ci
          end_ts=$(date +%s)
          echo "npm ci duration: $((end_ts - start_ts))s"

      - name: Run generator
        run: |
          start_ts=$(date +%s)
          npm run generate
          end_ts=$(date +%s)
          echo "generate duration: $((end_ts - start_ts))s"

      - name: Commit generated files (using PAT)
        env:
          PAT: ${{ secrets.REPO_PAT }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blog/posts/index.json rss.xml assets/resume.pdf assets/og || true
          git commit -m "chore: regenerate posts index, RSS, OG images, and resume PDF" || echo "No changes to commit"
          git remote set-url origin https://x-access-token:${PAT}@github.com/$GITHUB_REPOSITORY.git
          git push origin HEAD:main || echo "Push failed"
