name: Generate and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "5 * * * *"

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: America/Los_Angeles

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Cache Puppeteer browser
        id: cache-puppeteer
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Log cache status
        run: |
          echo "Puppeteer cache hit: ${{ steps.cache-puppeteer.outputs.cache-hit }}"
          echo "npm cache enabled through actions/setup-node"
          node --version
          npm --version

      - name: Install dependencies
        run: |
          start_ts=$(date +%s)
          npm ci
          end_ts=$(date +%s)
          echo "npm ci duration: $((end_ts - start_ts))s"

      - name: Run generator
        run: |
          start_ts=$(date +%s)
          npm run generate
          end_ts=$(date +%s)
          echo "generate duration: $((end_ts - start_ts))s"

      - name: Stage site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'scripts/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'README.md' \
            ./ _site/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
