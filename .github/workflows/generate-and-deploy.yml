name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage site artifact
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'scripts/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'README.md' \
            ./ _site/
          find _site/blog/posts -name '*.md' -delete 2>/dev/null || true
          rm -rf _site/blog/posts/_templates

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
