name: Generate and deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 8 * * *"

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TZ: America/Los_Angeles

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.schedule-gate.outputs.should_run }}
    steps:
      - name: Check midnight Pacific schedule window
        id: schedule-gate
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Non-scheduled trigger: proceeding"
            exit 0
          fi

          local_now=$(TZ=America/Los_Angeles date '+%Y-%m-%d %H:%M')
          local_time=$(TZ=America/Los_Angeles date '+%H:%M')
          echo "Local Pacific time: ${local_now}"

          if [ "${local_time}" = "00:00" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Scheduled run is inside the midnight Pacific window"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Skipping scheduled run outside the midnight Pacific window"
          fi

      - name: Checkout
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/checkout@v5

      - name: Configure Pages
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/configure-pages@v5

      - name: Cache Puppeteer browser
        id: cache-puppeteer
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      - name: Setup Node
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Log cache status
        if: steps.schedule-gate.outputs.should_run == 'true'
        run: |
          echo "Puppeteer cache hit: ${{ steps.cache-puppeteer.outputs.cache-hit }}"
          echo "npm cache enabled through actions/setup-node"
          node --version
          npm --version

      - name: Install dependencies
        if: steps.schedule-gate.outputs.should_run == 'true'
        run: |
          start_ts=$(date +%s)
          npm ci
          end_ts=$(date +%s)
          echo "npm ci duration: $((end_ts - start_ts))s"

      - name: Run generator
        if: steps.schedule-gate.outputs.should_run == 'true'
        run: |
          start_ts=$(date +%s)
          npm run generate
          end_ts=$(date +%s)
          echo "generate duration: $((end_ts - start_ts))s"

      - name: Stage site artifact
        if: steps.schedule-gate.outputs.should_run == 'true'
        run: |
          rm -rf _site
          mkdir -p _site
          rsync -av \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'node_modules/' \
            --exclude 'scripts/' \
            --exclude 'package.json' \
            --exclude 'package-lock.json' \
            --exclude 'README.md' \
            ./ _site/
          find _site/blog/posts -name '*.md' -delete
          rm -rf _site/blog/posts/_templates

      - name: Upload Pages artifact
        if: steps.schedule-gate.outputs.should_run == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: needs.build.outputs.should_deploy == 'true'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
