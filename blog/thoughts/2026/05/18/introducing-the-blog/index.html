  <script id="post-data" type="application/json">{"title":"Introducing the blog","date":"2026-05-18","category":"Thoughts","tags":["platform engineering","writing","portfolio"],"keywords":["introduction","blog","reflections"],"excerpt":"A short introduction to the blog and the kinds of platform engineering, cloud, and MLOps topics it will cover.","content":"# Introducing the blog\n\nMay 18, 2026\n\nThis blog is a place to share practical lessons from platform engineering, cloud architecture, CI/CD modernization, MLOps, and the quieter parts of building reliable systems.\n\nSome posts will be technical deep dives. Others will be short reflections on engineering culture, learning, reliability, and the invisible work that helps teams move faster.\n\nThe goal is simple: document useful patterns, clarify what is working, and keep building a portfolio of ideas grounded in real engineering work.","slug":"introducing-the-blog","src":"posts/2026/05/2026-05-18-sample-post.md","route":"/blog/thoughts/2026/05/18/introducing-the-blog/","url":"/blog/thoughts/2026/05/18/introducing-the-blog/","absoluteUrl":"https://akjithendrakumar.github.io/blog/thoughts/2026/05/18/introducing-the-blog/","legacyUrl":"/blog/post.html?src=posts%2F2026%2F05%2F2026-05-18-sample-post.md","published":true}</script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="/assets/script.js"></script>
  <script>
    function escapeInlineHtml(value) {
      return value.replace(/[&<>]/g, function (ch) {
        return ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' })[ch];
      });
    }

    function renderPost() {
      const post = JSON.parse(document.getElementById('post-data').textContent);
      const markdown = post.content || '';
      const html = window.marked
        ? marked.parse(markdown)
        : '<pre>' + escapeInlineHtml(markdown) + '</pre>';

      document.getElementById('post-content').innerHTML = html;
      document.getElementById('share-panel').style.display = 'block';
      document.getElementById('share-title').textContent = post.title;

      const hashtags = (post.tags || []).map(function (tag) {
        return '#' + String(tag).replace(/[^a-zA-Z0-9]/g, '');
      }).join(' ');
      const pageUrl = window.location.href;
      const suggested = post.title + '\n\n' + post.excerpt + '\n\nRead more: ' + pageUrl + (hashtags ? '\n\n' + hashtags : '');
      document.getElementById('share-text').value = suggested;
      document.getElementById('open-linkedin').addEventListener('click', function () {
        const shareUrl = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(pageUrl);
        window.open(shareUrl, '_blank', 'noopener');
      });
    }

    document.addEventListener('DOMContentLoaded', renderPost);
  </script>
</body>
