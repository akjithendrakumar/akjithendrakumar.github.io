<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog post — Jithendra Kumar</title>
  <link href="../assets/styles.css" rel="stylesheet" />
  <meta name="description" content="Blog post" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="../">Jithendra Kumar</a>
      <nav class="site-nav site-nav-mobile" aria-label="Primary navigation">
        <a href="../">Home</a>
        <a href="index.html">Blog</a>
        <a href="../resume.html">Resume</a>
      </nav>
    </div>
  </header>

  <div class="site-layout">
    <aside class="sidebar" aria-label="Sidebar navigation">
      <div class="container">
        <nav class="site-nav-desktop">
          <a href="/">Home</a>
          <a href="/resume.html">Resume</a>
          <a href="/blog/">Blog</a>
        </nav>
      </div>
    </aside>

  <main class="section">
    <div class="container">
      <div id="post-root" class="card-grid">
        <article class="achievement-card">
          <div id="post-content">Loading post…</div>
        </article>
        <aside id="share-panel" style="display:none; margin-top:1rem;">
          <div class="panel-card">
            <p class="panel-label">Share</p>
            <h3 id="share-title">Share this post</h3>
            <p class="muted-note">Quickly share a ready-made LinkedIn post or customize text below.</p>
            <div style="display:flex; gap:0.5rem; margin:0.75rem 0; flex-wrap:wrap">
              <button id="open-linkedin" class="btn btn-primary">Open LinkedIn share</button>
              <button id="copy-text" class="btn btn-secondary">Copy post text</button>
            </div>
            <textarea id="share-text" style="width:100%; min-height:84px; padding:0.6rem; border-radius:8px; border:1px solid var(--line);"></textarea>
          </div>
        </aside>
      </div>
    </div>
  </main>
  </div>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© <span id="year"></span> Jithendra Kumar. Built for GitHub Pages.</p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../assets/script.js"></script>
  <script>
    function qs(name) {
      const params = new URLSearchParams(window.location.search);
      return params.get(name);
    }

    function parsePublishDate(dateString) {
      if (!dateString) return null;
      const [year, month, day] = dateString.split('-').map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day, 0, 0, 0, 0);
    }

    function isPublished(post) {
      const publishDate = parsePublishDate(post.date);
      return !publishDate || Date.now() >= publishDate.getTime();
    }

    async function loadPost() {
      const src = qs('src');
      if (!src) {
        document.getElementById('post-content').innerText = 'Missing post source.';
        return;
      }

      try {
        let meta = null;
        try {
          const listRes = await fetch('posts/index.json');
          if (listRes.ok) {
            const posts = await listRes.json();
            meta = posts.find(p => p.src === src.replace(/^\//, '')) || posts.find(p => p.src === src);
            if (meta && !isPublished(meta)) {
              document.getElementById('post-content').innerHTML = '<p>This post is scheduled and will be published at 12:00 AM on its publish date.</p>';
              return;
            }
          }
        } catch (inner) {
          // ignore metadata errors and continue with markdown fetch fallback
        }

        const res = await fetch(src);
        if (!res.ok) throw new Error('Failed to fetch');
        const md = await res.text();
        const html = marked.parse(md);
        document.getElementById('post-content').innerHTML = html;

        if (meta) {
          document.getElementById('share-panel').style.display = 'block';
          const pageUrl = window.location.href;
          const hashtags = (meta.tags || []).map(t => `#${t.replace(/[^a-zA-Z0-9]/g,'')}`).join(' ');
          const suggested = `${meta.title}\n\n${meta.excerpt}\n\nRead more: ${pageUrl}\n\n${hashtags}`;
          document.getElementById('share-text').value = suggested;
          document.getElementById('share-title').textContent = meta.title;

          document.getElementById('open-linkedin').addEventListener('click', ()=>{
            const shareUrl = 'https://www.linkedin.com/sharing/share-offsite/?url=' + encodeURIComponent(pageUrl);
            window.open(shareUrl, '_blank', 'noopener');
          });

          document.getElementById('copy-text').addEventListener('click', async ()=>{
            const txt = document.getElementById('share-text').value;
            try { await navigator.clipboard.writeText(txt); alert('Copied LinkedIn text to clipboard'); }
            catch(e){ prompt('Copy the text below:', txt); }
          });
        }

      } catch (e) {
        document.getElementById('post-content').innerText = 'Error loading post.';
      }
    }

    document.addEventListener('DOMContentLoaded', loadPost);
  </script>
</body>
</html>
