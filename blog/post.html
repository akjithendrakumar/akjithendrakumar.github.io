<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Redirecting blog post — Jithendra Kumar</title>
  <link href="../assets/styles.css" rel="stylesheet" />
  <meta name="description" content="Redirecting to the current blog post URL." />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="../">
        <span class="brand-mark" aria-hidden="true">J</span>
        <span class="brand-copy">
          <span class="brand-name">Jithendra Kumar</span>
          <span class="brand-meta">Cloud · DevOps · Platform</span>
        </span>
      </a>
      <nav class="site-nav site-nav-mobile" aria-label="Primary navigation">
        <a href="../">Home</a>
        <a href="index.html">Blog</a>
        <a href="../resume.html">Resume</a>
      </nav>
    </div>
  </header>

  <div class="site-layout">
    <aside class="sidebar" aria-label="Sidebar navigation">
      <div class="container">
        <nav class="site-nav-desktop">
          <a href="/">Home</a>
          <a href="/resume.html">Resume</a>
          <a href="/blog/">Blog</a>
        </nav>
      </div>
    </aside>

    <main class="section">
      <div class="container">
        <article class="achievement-card">
          <div id="redirect-status">Resolving post link…</div>
        </article>
      </div>
    </main>
  </div>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© <span id="year"></span> Jithendra Kumar. Built for GitHub Pages.</p>
    </div>
  </footer>

  <script src="../assets/script.js"></script>
  <script>
    function getSrc() {
      const params = new URLSearchParams(window.location.search);
      return params.get('src');
    }

    function parsePublishDate(dateString) {
      if (!dateString) return null;
      const [year, month, day] = dateString.split('-').map(Number);
      if (!year || !month || !day) return null;
      return new Date(year, month - 1, day, 0, 0, 0, 0);
    }

    function isPublished(post) {
      const publishDate = parsePublishDate(post.date);
      return !publishDate || Date.now() >= publishDate.getTime();
    }

    async function redirectLegacyLink() {
      const src = getSrc();
      const status = document.getElementById('redirect-status');

      if (!src) {
        status.innerHTML = '<p>This legacy blog URL no longer includes a post reference. <a href="/blog/">Go to the blog index</a>.</p>';
        return;
      }

      try {
        const response = await fetch('posts/index.json');
        if (!response.ok) throw new Error('Unable to load post index');

        const posts = await response.json();
        const normalized = src.replace(/^\//, '');
        const post = posts.find((item) => item.src === normalized || item.src === src);

        if (!post) {
          status.innerHTML = '<p>The requested post could not be found. <a href="/blog/">Go to the blog index</a>.</p>';
          return;
        }

        if (!isPublished(post)) {
          status.innerHTML = '<p>This post is scheduled and will publish at 12:00 AM on its publish date.</p>';
          return;
        }

        window.location.replace(post.url);
      } catch (error) {
        status.innerHTML = '<p>Unable to resolve this legacy link right now. <a href="/blog/">Go to the blog index</a>.</p>';
      }
    }

    document.addEventListener('DOMContentLoaded', redirectLegacyLink);
  </script>
</body>
</html>
