<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Jithendra Kumar</title>
  <meta name="description" content="Blog posts about cloud architecture, DevOps, and MLOps." />
  <link href="../assets/styles.css" rel="stylesheet" />
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="../">
        <span class="brand-mark" aria-hidden="true">J</span>
        <span class="brand-copy">
          <span class="brand-name">Jithendra Kumar</span>
          <span class="brand-meta">Cloud · DevOps · Platform</span>
        </span>
      </a>
      <nav class="site-nav site-nav-mobile" aria-label="Primary navigation">
        <a href="/">Home</a>
        <a href="/resume.html">Resume</a>
        <a href="/blog/">All Posts</a>
        <span id="blog-nav-mobile"></span>
      </nav>
    </div>
  </header>

  <div class="site-layout">
    <aside class="sidebar" aria-label="Sidebar navigation">
      <div class="container">
        <nav class="site-nav-desktop">
          <a href="/">Home</a>
          <a href="/resume.html">Resume</a>
          <a href="/blog/">All Posts</a>
          <span id="blog-nav-desktop"></span>
        </nav>
      </div>
    </aside>

  <main class="section">
    <div class="container">
      <div class="section-heading narrow">
        <p class="section-kicker">Blog</p>
        <h2>Recent posts</h2>
        <p>Short thoughts and technical articles on platform engineering, cloud, CI/CD, MLOps, and AI systems.</p>
      </div>

      <div class="blog-filter-bar">
        <div class="blog-filter-row">
          <label class="blog-filter-label" for="category-filter">Type</label>
          <select id="category-filter" class="blog-filter-input">
            <option value="">All</option>
          </select>
        </div>
        <div class="blog-filter-row">
          <label class="blog-filter-label" for="topic-filter">Topic</label>
          <select id="topic-filter" class="blog-filter-input">
            <option value="">All</option>
          </select>
        </div>
        <div class="blog-filter-row blog-filter-row-grow">
          <label class="blog-filter-label" for="search-input">Search</label>
          <input id="search-input" class="blog-filter-input" type="search" list="blog-dictionary" placeholder="Search by title, topic, keyword, or phrase" />
          <datalist id="blog-dictionary"></datalist>
        </div>
        <a class="btn btn-secondary" href="/rss.xml">RSS</a>
      </div>

      <div class="blog-category-pills" id="blog-category-pills" aria-label="Blog categories">
        <button type="button" class="blog-category-pill is-active" data-category="">All</button>
      </div>

      <div class="blog-results-meta" id="results-meta">
        <span>Loading posts...</span>
      </div>

      <div class="card-grid two-up" id="posts-list">
        <!-- Posts will be rendered here -->
      </div>

      <div class="scroll-sentinel" id="scroll-sentinel"></div>

      <script>
        let allPosts = [];
        let filtered = [];
        let currentPage = 1;
        const pageSize = 6;
        let categoryMap = {}; // slug -> display label, built from data

        function parsePublishDate(dateString) {
          if (!dateString) return null;
          const [year, month, day] = dateString.split('-').map(Number);
          if (!year || !month || !day) return null;
          return new Date(year, month - 1, day, 0, 0, 0, 0);
        }

        function isPublished(post) {
          const publishDate = parsePublishDate(post.date);
          return !publishDate || Date.now() >= publishDate.getTime();
        }

        function normalize(text) {
          return (text || '').toLowerCase().trim();
        }

        function paginate(list, page) {
          const start = (page - 1) * pageSize;
          return list.slice(start, start + pageSize);
        }

        function render(list, append = false) {
          const container = document.getElementById('posts-list');
          if (!append) container.innerHTML = '';

          if (!append && !list.length) {
            container.innerHTML = '<p class="muted-note">No posts found for the current filters.</p>';
            return;
          }

          for (const p of list) {
            const article = document.createElement('article');
            article.className = 'achievement-card';
            const tagList = (p.tags || []).map(tag => `<span>${tag}</span>`).join('');
            article.innerHTML = `
              <p class="panel-label">${p.category || 'General'}</p>
              <h3><a href="${p.url}">${p.title}</a></h3>
              <p class="muted-note">${p.date} · ${(p.tags || []).join(', ') || 'General'}</p>
              <p class="hero-copy">${p.excerpt}</p>
              <div class="tags">${tagList}</div>
            `;
            container.appendChild(article);
          }
        }

        function updatePageInfo() {
          const meta = document.getElementById('results-meta');
          const topic = document.getElementById('topic-filter').value;
          const category = document.getElementById('category-filter').value;
          const q = document.getElementById('search-input').value.trim();
          const filters = [category, topic, q].filter(Boolean);
          const suffix = filters.length ? ` for ${filters.join(' · ')}` : '';
          meta.innerHTML = `<span>${filtered.length} post${filtered.length === 1 ? '' : 's'}${suffix}</span>`;
        }

        function buildHaystack(post) {
          return normalize([
            post.title,
            post.excerpt,
            post.category,
            ...(post.tags || []),
            ...(post.keywords || [])
          ].join(' '));
        }

        function setActiveCategory(category) {
          document.querySelectorAll('.blog-category-pill').forEach(button => {
            button.classList.toggle('is-active', button.dataset.category === category);
          });
        }

        function buildCategoryPills(categories) {
          const pillsContainer = document.getElementById('blog-category-pills');
          categories.forEach(cat => {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'blog-category-pill';
            btn.dataset.category = cat;
            btn.textContent = cat;
            btn.addEventListener('click', () => {
              document.getElementById('category-filter').value = cat;
              applyFilters();
            });
            pillsContainer.appendChild(btn);
          });

          // Wire the All button now that pills are ready
          pillsContainer.querySelector('[data-category=""]').addEventListener('click', () => {
            document.getElementById('category-filter').value = '';
            applyFilters();
          });
        }

        function buildNavLinks(categories) {
          const mobileNav = document.getElementById('blog-nav-mobile');
          const desktopNav = document.getElementById('blog-nav-desktop');

          categories.forEach(cat => {
            const slug = cat.toLowerCase().replace(/\s+/g, '-');
            [mobileNav, desktopNav].forEach(container => {
              const a = document.createElement('a');
              a.href = `/blog/?type=${slug}`;
              a.textContent = cat;
              a.addEventListener('click', e => {
                e.preventDefault();
                document.getElementById('category-filter').value = cat;
                applyFilters();
                history.pushState(null, '', `/blog/?type=${slug}`);
              });
              container.appendChild(a);
            });
          });
        }

        function applyFilters() {
          const category = document.getElementById('category-filter').value;
          const topic = document.getElementById('topic-filter').value;
          const q = normalize(document.getElementById('search-input').value);

          filtered = allPosts.filter(post => {
            if (category && post.category !== category) return false;
            if (topic && !(post.tags || []).includes(topic) && !(post.keywords || []).includes(topic)) return false;
            if (!q) return true;
            return buildHaystack(post).includes(q);
          });

          currentPage = 1;
          render(paginate(filtered, currentPage));
          updatePageInfo();
          setActiveCategory(category);

          const params = new URLSearchParams(location.search);
          if (category) {
            params.set('type', category.toLowerCase().replace(/\s+/g, '-'));
          } else {
            params.delete('type');
          }
          const qs = params.toString();
          history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
        }

        function populateFilterOptions(posts, categories) {
          const categoryFilter = document.getElementById('category-filter');
          const topicFilter = document.getElementById('topic-filter');
          const dictionary = document.getElementById('blog-dictionary');

          const topics = new Set();
          const dictionaryTerms = new Set();

          // Category dropdown — one option per distinct category in data
          categories.forEach(cat => {
            const option = document.createElement('option');
            option.value = cat;
            option.textContent = cat;
            categoryFilter.appendChild(option);
          });

          posts.forEach(post => {
            (post.tags || []).forEach(tag => topics.add(tag));
            (post.keywords || []).forEach(keyword => topics.add(keyword));
            [post.title, post.category, ...(post.tags || []), ...(post.keywords || [])]
              .filter(Boolean)
              .forEach(term => dictionaryTerms.add(term));
          });

          for (const topic of Array.from(topics).sort((a, b) => a.localeCompare(b))) {
            const option = document.createElement('option');
            option.value = topic;
            option.textContent = topic;
            topicFilter.appendChild(option);
          }

          for (const term of Array.from(dictionaryTerms).sort((a, b) => a.localeCompare(b))) {
            const option = document.createElement('option');
            option.value = term;
            dictionary.appendChild(option);
          }
        }

        function wireFilterEvents() {
          document.getElementById('category-filter').addEventListener('change', applyFilters);
          document.getElementById('topic-filter').addEventListener('change', applyFilters);
          document.getElementById('search-input').addEventListener('input', applyFilters);
        }

        async function loadPosts() {
          try {
            const res = await fetch('posts/index.json');
            allPosts = (await res.json()).filter(isPublished);
            allPosts.sort((a, b) => b.date.localeCompare(a.date));

            // Derive categories from data, preserving first-seen order then sorting
            const categories = Array.from(
              new Set(allPosts.map(p => p.category).filter(Boolean))
            ).sort();

            // Build slug->label map for URL routing
            categories.forEach(cat => {
              categoryMap[cat.toLowerCase().replace(/\s+/g, '-')] = cat;
            });

            buildCategoryPills(categories);
            buildNavLinks(categories);
            populateFilterOptions(allPosts, categories);
            wireFilterEvents();

            const sentinel = document.getElementById('scroll-sentinel');
            const io = new IntersectionObserver(entries => {
              for (const e of entries) {
                if (e.isIntersecting) {
                  const total = Math.ceil(filtered.length / pageSize);
                  if (currentPage < total) {
                    currentPage++;
                    render(paginate(filtered, currentPage), true);
                  }
                }
              }
            }, { rootMargin: '400px' });
            io.observe(sentinel);

            filtered = allPosts;
            render(paginate(filtered, currentPage));
            updatePageInfo();

            // Restore filter from URL param
            const typeParam = new URLSearchParams(location.search).get('type');
            if (typeParam) {
              const cat = categoryMap[typeParam.toLowerCase()];
              if (cat) {
                document.getElementById('category-filter').value = cat;
                applyFilters();
              }
            }
          } catch (e) {
            document.getElementById('posts-list').innerText = 'Unable to load posts.';
          }
        }

        document.addEventListener('DOMContentLoaded', loadPosts);
      </script>
    </div>
  </main>

  </div>

  <footer class="site-footer">
    <div class="container footer-wrap">
      <p>© <span id="year"></span> Jithendra Kumar. Built for GitHub Pages.</p>
    </div>
  </footer>

  <script src="../assets/script.js"></script>
</body>
</html>
